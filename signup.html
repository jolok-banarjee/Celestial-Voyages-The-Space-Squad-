<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Image/icon.png">
    <title>Login | Celestial Voyages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-container input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-light);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            width: 100%;
        }
        .login-container input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .login-container button {
            background: linear-gradient(135deg, var(--accent) 0%, #c73e54 100%);
            border: none;
            border-radius: 50px;
            padding: 0.8rem 2rem;
            color: white;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233,69,96,0.5);
        }
        .switch-page {
            color: var(--accent);
            text-decoration: none;
            margin-top: 1rem;
            display: inline-block;
        }
        .logo-login { font-size: 3rem; color: var(--gold); margin-bottom: 1rem; }
        .back-link { color: var(--text-muted); text-decoration: none; margin-bottom: 1rem; display: inline-block; }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <canvas id="stars" class="stars" style="position:fixed;"></canvas>
    <div class="login-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <div class="logo-login">&#9733;</div>
        <h1>Celestial Voyages</h1>
        <form>
            <input type="email" placeholder="Enter your email" required>
            <input type="password" placeholder="Enter your password" required>
            <button type="submit">Login</button>
        </form>
        <a href="#" class="switch-page">Don't have an account? Sign up</a>
    </div>
    <script src="js/stars.js"></script>
</body>
</html>
