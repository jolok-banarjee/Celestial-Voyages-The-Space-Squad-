<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Image/icon.png">
    <title>Neptune Moons | Celestial Voyages</title>
    <meta name="description" content="Triton and the dark moons of the ice giant Neptune.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f0f23;
            --accent: #e94560;
            --text-light: #f5f5f5;
            --text-muted: #a0a0a0;
            --glass: rgba(255,255,255,0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #preloader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--bg-dark);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #preloader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-ring {
            width: 60px; height: 60px; border: 3px solid rgba(233,69,96,0.2);
            border-top-color: #e94560; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .navbar {
            padding: 0.6rem 0 !important; transition: all 0.3s ease;
            background: rgba(15,15,35,0.95) !important;
        }
        .navbar.scrolled {
            background: rgba(15,15,35,0.98) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            padding: 0.4rem 0 !important;
        }
        .navbar-brand h1 {
            font-size: 1.4rem !important; font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            letter-spacing: 0.5px; margin: 0;
        }
        .nav-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-light); border-radius: 50px;
            padding: 0.4rem 1.2rem; font-size: 0.85rem; font-weight: 500;
            transition: all 0.3s ease; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .nav-btn:hover {
            background: var(--accent); border-color: var(--accent);
            color: #fff; transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(233,69,96,0.3);
        }
        .navbar-nav { gap: 0.3rem; }
        .navbar-nav .nav-link {
            color: var(--text-muted) !important;
            font-size: 0.9rem; font-weight: 500;
            padding: 0.5rem 0.9rem !important; border-radius: 50px;
            transition: all 0.3s ease;
        }
        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link.active {
            color: var(--accent) !important;
            background: rgba(233,69,96,0.1);
        }
        .navbar-toggler {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.4rem 0.6rem;
        }
        .navbar-collapse {
            background: rgba(15,15,35,0.98);
            padding: 1rem; border-radius: 12px; margin-top: 0.5rem;
        }
        @media (min-width: 992px) {
            .navbar-collapse {
                display: flex !important; flex-basis: auto;
                background: transparent; padding: 0; margin-top: 0;
            }
            .navbar-nav { flex-direction: row; }
            .navbar-toggler { display: none !important; }
        }
        .coming-soon {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 1rem;
            text-align: center;
        }
        .coming-soon i {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        .coming-soon h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .coming-soon p {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 2rem;
        }
        .btn-home {
            background: linear-gradient(135deg, var(--accent) 0%, #c73e54 100%);
            border: none; border-radius: 50px;
            padding: 0.8rem 2rem;
            color: white; font-weight: 600;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 0.5rem;
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(233,69,96,0.5);
            color: white;
        }
        footer {
            padding: 2rem 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        footer p { color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="preloader"><div class="loader-ring"></div></div>
    <canvas id="stars" class="stars" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:-1;"></canvas>

    <nav class="navbar navbar-expand-lg navbar-dark py-1" id="mainNav">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html"><h1>Celestial Voyages: A Dream Come True</h1></a>
            <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="../space_adventure.html">Adventures</a></li>
                    <li class="nav-item"><a class="nav-link active" href="../cosmos_classroom.html">Learn</a></li>
                    <li class="nav-item"><a class="nav-link" href="../vr.html">VR</a></li>
                    <li class="nav-item"><a class="nav-link" href="../travel_experience.html">Reviews</a></li>
                    <li class="nav-item"><a class="nav-link" href="../index.html#contact">Contact</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2 ms-lg-3">
                    <a href="../ticket.html" class="nav-btn"><i class="fas fa-ticket-alt"></i> My Tickets</a>
                    <a href="../signup.html" class="nav-btn"><i class="fas fa-user"></i> My Account</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="coming-soon">
        <i class="fas fa-moon"></i>
        <h1>Neptune Moons</h1>
        <p>Triton and the dark moons of the ice giant Neptune.</p>
        <a href="../cosmos_classroom.html" class="btn-home"><i class="fas fa-arrow-left"></i> Back to Cosmos Classroom</a>
    </section>

    <footer>
        <p>&copy; 2026 Celestial Voyages. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/stars.js"></script>
    <script>
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('preloader').classList.add('hidden'), 400);
        });
        const nav = document.getElementById('mainNav');
        window.addEventListener('scroll', () => {
            nav.classList.toggle('scrolled', window.scrollY > 50);
        });
    </script>
</body>
</html>
